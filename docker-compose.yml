version: '3.9'

services:
  api-gateway:
      build: ./api-gateway
      ports:
        - "8000:8000"
      depends_on:
        - borrow-return
        - book-catalog
        - user-management
      networks:
        - library-net

  borrow-return:
    build: ./services/borrow-return
    ports:
      - "8081:8081"
    restart: always
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - library-net

  book-catalog:
      build: ./services/book-catalog
      ports:
        - "8082:8082"
      restart: always
      depends_on:
      - rabbitmq
      networks:
        - library-net

  user-management:
      build: ./services/user-management
      ports:
        - "8083:8083"
      restart: always
      depends_on:
      - rabbitmq
      networks:
        - library-net

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - library-net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - library-net

networks:
  library-net:

volumes:
  mongo-data:
