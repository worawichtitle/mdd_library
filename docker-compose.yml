version: '3.9'

services:

  borrow-return:
    build: ./services/borrow-return
    ports:
      - "8081:8081"
    restart: always
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - library-net

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - library-net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - library-net

networks:
  library-net:

volumes:
  mongo-data:
