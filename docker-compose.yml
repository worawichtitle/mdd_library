version: '3.9'

services:

  borrow-return:
    build: ./services/borrow-return
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    networks:
      - library-net

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - library-net

networks:
  library-net:

volumes:
  mongo-data:
